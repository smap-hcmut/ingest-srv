version: "3.8"

# =====================================================
# Ingest Service – Lite Infrastructure Stack (Optimized for Weak PC)
# Memory Target: ~800MB - 1GB (down from ~3GB+)
# Services: PostgreSQL, Redis, MinIO, Kafka (KRaft mode), RabbitMQ
# UI Tools: Disabled by default to save memory
# Usage: docker compose up -d
# =====================================================

services:
  # ─── PostgreSQL (~150MB) ───────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ingest-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smap
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/00-init-db.sh
      - ./migrations:/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smap"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - ingest-network

  # ─── Redis (~20MB) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: ingest-redis
    command: redis-server --requirepass 21042004 --databases 16
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "21042004", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - ingest-network

  # ─── MinIO (~150MB) ────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ingest-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: tantai
      MINIO_ROOT_PASSWORD: "21042004"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - ingest-network

  minio-init:
    image: minio/mc:latest
    container_name: ingest-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 tantai 21042004;
        mc mb --ignore-existing local/ingest-data;
        echo 'Bucket ingest-data ready';
      "
    networks:
      - ingest-network
    restart: on-failure

  # ─── Kafka (KRaft mode, NO Zookeeper, ~300MB) ──────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ingest-kafka
    ports:
      - "9092:9092" # External (localhost)
      - "29092:29092" # Internal
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:29093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Limit JVM heap size heavily to save memory
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms256M"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 400M
    networks:
      - ingest-network

  # ─── RabbitMQ (~200MB) ─────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ingest-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: "21042004"
      RABBITMQ_DEFAULT_VHOST: /
      # Limit RabbitMQ memory footprint
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit disk_free_limit 50000000 -rabbit vm_memory_high_watermark 0.4"
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M
    networks:
      - ingest-network

# ─── Volumes ──────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  kafka_data:
    driver: local
  rabbitmq_data:
    driver: local

# ─── Network ──────────────────────────────────────────
networks:
  ingest-network:
    driver: bridge
