# Traefik Middleware for stripping /ingest prefix
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: ingest-stripprefix
  namespace: smap
spec:
  stripPrefix:
    prefixes:
      - /ingest

---
# Traefik IngressRoute for ingest API
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ingest-ingress
  namespace: smap
  labels:
    app.kubernetes.io/name: ingest
    app.kubernetes.io/part-of: smap
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`smap-api.tantai.dev`) && PathPrefix(`/ingest`)
      kind: Rule
      services:
        - name: ingest-api
          port: 80
      middlewares:
        - name: ingest-stripprefix
