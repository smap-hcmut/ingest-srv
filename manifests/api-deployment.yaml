apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-api
  namespace: smap
  labels:
    app.kubernetes.io/name: ingest-api
    app.kubernetes.io/part-of: smap
    app.kubernetes.io/component: api
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: ingest-api
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ingest-api
        app.kubernetes.io/name: ingest-api
        app.kubernetes.io/part-of: smap
    spec:
      imagePullSecrets:
        - name: zot-registry
      containers:
        - name: ingest-api
          image: 172.16.21.10:5000/smap/ingest-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          envFrom:
            - configMapRef:
                name: ingest-config
            - secretRef:
                name: ingest-secrets
          env:
            - name: CONTAINER_NAME
              value: "ingest-api"
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: ingest-api
  namespace: smap
  labels:
    app.kubernetes.io/name: ingest-api
    app.kubernetes.io/part-of: smap
spec:
  selector:
    app: ingest-api
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  type: ClusterIP
