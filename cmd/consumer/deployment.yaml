apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-consumer
  namespace: smap
  labels:
    app: ingest-consumer
    app.kubernetes.io/part-of: smap
    app.kubernetes.io/component: consumer
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: ingest-consumer
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: ingest-consumer
        app.kubernetes.io/part-of: smap
    spec:
      imagePullSecrets:
        - name: harbor-registry
      containers:
        - name: ingest-consumer
          image: registry.tantai.dev/smap/ingest-consumer:260316-234608
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          envFrom:
            - configMapRef:
                name: ingest-config
            - secretRef:
                name: ingest-secrets
          env:
            - name: CONTAINER_NAME
              value: "ingest-consumer"
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
      terminationGracePeriodSeconds: 30
