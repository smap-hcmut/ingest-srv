apiVersion: apps/v1
kind: Deployment
metadata:
  name: smap-ingest-scheduler
  namespace: smap
  labels:
    app: smap-ingest-scheduler
    service: ingest-srv
    version: v1
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: smap-ingest-scheduler
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: smap-ingest-scheduler
        service: ingest-srv
        version: v1
    spec:
      imagePullSecrets:
        - name: harbor-secret
      containers:
        - name: smap-ingest-scheduler
          image: registry.tantai.dev/smap/ingest-srv-scheduler:latest
          imagePullPolicy: Always
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "1000m"
          envFrom:
            - configMapRef:
                name: smap-ingest-config
            - secretRef:
                name: smap-ingest-secrets
          env:
            - name: CONTAINER_NAME
              value: "smap-ingest-scheduler"
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - ps aux | grep -v grep | grep -q scheduler
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            successThreshold: 1
            failureThreshold: 3
      terminationGracePeriodSeconds: 30
