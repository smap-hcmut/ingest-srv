# SMAP Ingest Service – Example configuration

environment:
  name: development

http_server:
  host: "0.0.0.0"
  port: 8080
  mode: debug

logger:
  level: debug
  mode: debug
  encoding: console
  color_enabled: true

postgres:
  host: 172.16.19.10
  port: 5432
  user: ingest_master
  password: ingest_master_pwd
  dbname: smap
  sslmode: disable
  schema: schema_ingest

redis:
  host: redis.tantai.dev
  port: 6379
  password: "21042004"
  db: 1

minio:
  endpoint: "172.16.21.10:9000"
  access_key: "tantai"
  secret_key: "21042004"
  use_ssl: false
  region: "us-east-1"
  bucket: "ingest-data"
  async_upload_workers: 4
  async_upload_queue_size: 100

kafka:
  brokers:
    - "kafka.tantai.dev:9094"
  topic: "ingest.events"
  uap_topic: "smap.collector.output"
  group_id: "ingest-consumer"

rabbitmq:
  url: "amqp://admin:21042004@172.16.21.206:5672/"
  retry_without_timeout: true

jwt:
  secret_key: "smap-secret-key-at-least-32-chars-long"

cookie:
  name: "smap_auth_token"
  max_age: 28800  # 8 hours
  domain: ".tantai.dev"  # Used for production; localhost origin gets SameSite=None dynamically
encrypter:
  key: "test-encryption-key-32-chars-123"

internal:
  internal_key: "ingest-service-key"

discord:
  webhook_url: ""

scheduler:
  heartbeat_cron: "*/1 * * * *"
  timezone: "Asia/Ho_Chi_Minh"
  heartbeat_limit: 20
